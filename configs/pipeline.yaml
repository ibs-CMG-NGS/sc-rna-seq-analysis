# configs/pipeline.yaml
# 파이프라인 분석 파라미터 설정
# 변경 시 해당 단계부터 Snakemake가 자동으로 재실행됨

# =============================================================================
# QC & 필터링
# =============================================================================
qc:
  min_genes: 200          # 세포당 최소 유전자 수
  max_genes: 8000         # 세포당 최대 유전자 수 (doublet 간접 지표)
  min_counts: 500         # 세포당 최소 UMI count
  max_pct_mt: 20          # 미토콘드리아 유전자 비율 최대 (%)
  scrublet:
    expected_doublet_rate: 0.06
    doublet_score_threshold: 0.25

# =============================================================================
# 정규화
# =============================================================================
normalization:
  target_sum: 10000       # 세포당 정규화 총합 (10K)

# =============================================================================
# Highly Variable Genes
# =============================================================================
hvg:
  flavor: "seurat_v3"
  n_top_genes: 3000
  batch_key: "sample"     # 샘플 간 batch 효과를 고려한 HVG 선정

# =============================================================================
# 차원 축소
# =============================================================================
pca:
  n_comps: 50

neighbors:
  n_neighbors: 15
  n_pcs: 30               # neighbor graph 구성에 사용할 PC 수
  metric: "euclidean"

umap:
  min_dist: 0.3
  spread: 1.0
  random_state: 42

# =============================================================================
# Batch Correction (Harmony)
# =============================================================================
harmony:
  batch_key: "sample"
  max_iter_harmony: 20

# =============================================================================
# 클러스터링
# =============================================================================
clustering:
  algorithm: "leiden"
  resolutions: [0.3, 0.5, 0.8, 1.0, 1.2]
  default_resolution: 0.8   # downstream 분석 기본값
  random_state: 42

# =============================================================================
# 유전자 prefix (종 구분)
# =============================================================================
genome:
  mt_prefix: "MT-"           # 인간 미토콘드리아 유전자
  rb_prefixes: ["RPS", "RPL"] # 리보솜 유전자

# =============================================================================
# 출력 설정
# =============================================================================
output:
  figure_dpi: 150
  figure_format: "png"       # png | svg | pdf

# =============================================================================
# RNA Velocity (velocyto + scVelo)
# =============================================================================
velocity:
  gtf: ""                  # 필수: 게놈 GTF 파일 경로. 예: "data/ref/Homo_sapiens.GRCh38.110.gtf"
  repeat_mask_gtf: ""      # 선택: repeat mask GTF (velocyto -m 옵션). 예: "data/ref/hg38_rmsk.gtf"
  samtools_threads: 4      # BAM 정렬에 사용할 samtools 스레드 수
  scvelo_mode: "dynamical" # 'stochastic' (빠름) | 'dynamical' (정확, 권장)
  n_top_genes: 2000        # scVelo 전처리에 사용할 HVG 수
  min_shared_counts: 20    # spliced/unspliced 최소 공유 카운트
  n_jobs: 4                # recover_dynamics 병렬 작업 수 (dynamical 모드)
